name: Matrix startegy day-41

on:
  workflow_dispatch:

jobs:
  test-job:
    startegy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12", "3.13"]
    
    runs-on: ${{ matrix.os }}

    steps:
      - name: Setup python
        uses: actions/Setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run tests
        uses: pytest
        
