name: Day 43 - Smart Pipeline

on: push

jobs:
  check-changes-job:
    runs-on: ubuntu-latest
    outputs:
      # Change deploy-job to deploy so it matches the step script below!
      should_deploy: ${{ steps.decision-step.outputs.deploy }}
    steps:
      - id: decision-step
        run: echo "deploy=yes" >> $GITHUB_OUTPUT
    
  deploy-job:
    runs-on: ubuntu-latest
    needs: check-changes-job
    if: ${{ needs.check-changes-job.outputs.should_deploy == 'yes' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Execute Deployment
        run: echo "Deployment executed successfully by ${{ github.actor }}"