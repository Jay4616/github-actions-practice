name: Day 40 Workflow

on: push

jobs:
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        run: actions/checkout@v4

      - name: Say Hello
        run: echo "Hello from github actions day40"

      - name: Print Current Date and time
        run: date

      - name: Print current branch name
        run: echo "The current branch is ${{ github.ref_name }}"

      - name: List the files in repository
        run: ls -la

      - name: Print the OS details
        run: uname -a



      
